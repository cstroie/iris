  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"30e06282-c40f-4f05-bef8-703442af4344\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"6bebccaa-e359-402e-90bd-ad9024a5135d\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{background:var(--bg);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}\n  [data-theme]{\n    --bg:#0b0d10; --surface:#15181e; --surface-2:#1b1f26; --border:#242932;\n    --text:#eef1f5; --muted:#8b93a2; --faint:#5f6774;\n    --accent:oklch(0.86 0.2 128); --accent-ink:#0c1206; --accent-dim:#15230f; --accent-border:#243d18;\n    --dose-empty:#2a303a; --shadow:0 22px 55px -34px rgba(0,0,0,.75); --overlay:rgba(6,8,11,.74);\n  }\n  [data-theme=\"light\"]{\n    --bg:#f3f4f0; --surface:#ffffff; --surface-2:#eceee9; --border:#e0e2dc;\n    --text:#14171c; --muted:#545d6e; --faint:#767e8c;\n    --accent:oklch(0.66 0.19 131); --accent-ink:#0c1206; --accent-dim:#eef6da; --accent-border:#cde29e;\n    --dose-empty:#dde1d8; --shadow:0 18px 44px -30px rgba(40,50,20,.26); --overlay:rgba(20,23,28,.42);\n  }\n  ::-webkit-scrollbar{width:9px;height:9px}\n  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}\n  input{font-family:inherit}\n  @keyframes irisspin{to{transform:rotate(360deg)}}\n  @keyframes irisfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  @keyframes irispop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}\n  @media print{\n    [data-theme]{--bg:#fff;--surface:#fff;--surface-2:#fff;--text:#000;--muted:#333;--faint:#555;--border:#bbb;--shadow:none;--dose-empty:#ddd}\n    [data-noprint]{display:none!important}\n    [data-printonly]{display:block!important}\n    [data-rec]{break-inside:avoid;border:1px solid #999!important;box-shadow:none!important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div data-theme=\"dark\" ref=\"{{ rootRef }}\" style=\"min-height:100vh;background:var(--bg);color:var(--text)\">\n  <div style=\"max-width:100%;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative\">\n\n    <!-- ===== HEADER ===== -->\n    <header data-noprint=\"\" style=\"position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:color-mix(in srgb, var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)\">\n      <div role=\"button\" onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer\">\n        <div style=\"width:32px;height:32px;border-radius:50%;border:2.5px solid var(--accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--accent)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;line-height:1\"><span style=\"font:700 19px 'Space Grotesk',sans-serif;letter-spacing:.13em\">IRIS<\u002Fspan><span style=\"font:500 8.5px 'IBM Plex Mono',monospace;color:var(--faint);letter-spacing:.1em;margin-top:3px\">INDICAȚII RADIOIMAGISTICE STRUCTURATE<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px\">\n        <button onclick=\"{{ openLegend }}\" title=\"Legendă\" style=\"width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:15px;cursor:pointer\">ⓘ<\u002Fbutton>\n        <button onclick=\"{{ toggleTheme }}\" title=\"Temă\" style=\"width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:15px;cursor:pointer\">{{ themeIcon }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <main style=\"flex:1;padding:0 20px 48px\">\n\n      <!-- ============ HOME ============ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"\">\n        <div style=\"padding:34px 4px 22px\">\n          <h1 style=\"font:700 34px/1.12 'Space Grotesk',sans-serif;letter-spacing:-.02em;margin:0 0 12px;text-wrap:balance;max-width:640px\">{{ heroTitle }}<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.6;color:var(--muted);margin:0;max-width:520px\">Ghid de indicații radioimagistice — {{ countSituations }} situații clinice, {{ countRecs }} recomandări. Caută un simptom sau răsfoiește pe capitole.<\u002Fp>\n        <\u002Fdiv>\n        <div role=\"button\" onclick=\"{{ goSearch }}\" style=\"display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 17px;cursor:text;box-shadow:var(--shadow)\">\n          <span style=\"color:var(--accent);font-size:18px\">⌕<\u002Fspan>\n          <span style=\"font-size:15px;color:var(--faint)\">Caută simptom, examen sau fragment de cuvânt…<\u002Fspan>\n          <span style=\"margin-left:auto;font:600 10px 'IBM Plex Mono',monospace;background:var(--surface-2);border:1px solid var(--border);color:var(--faint);padding:4px 7px;border-radius:6px\">/<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.14em;color:var(--faint);margin:20px 4px 10px\">ÎNCEARCĂ<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <sc-for list=\"{{ exampleChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasRecent }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin:32px 4px 12px\">\n            <span style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.16em;color:var(--faint)\">VIZUALIZATE RECENT<\u002Fspan>\n            <button onclick=\"{{ clearRecent }}\" style=\"border:0;background:transparent;color:var(--faint);font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;cursor:pointer\" style-hover=\"color:var(--text)\">ȘTERGE<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;overflow-x:auto;margin:0 -20px;padding:2px 20px 8px\">\n            <sc-for list=\"{{ recentVM }}\" as=\"q\" hint-placeholder-count=\"3\">\n              <div role=\"button\" onclick=\"{{ q.onOpen }}\" style=\"flex:0 0 232px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;cursor:pointer;display:flex;flex-direction:column\" style-hover=\"border-color:var(--accent-border)\">\n                <div style=\"font:500 9.5px 'IBM Plex Mono',monospace;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ q.crumb }}<\u002Fdiv>\n                <div style=\"font:600 14px/1.32 'Space Grotesk',sans-serif;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px\">{{ q.name }}<\u002Fdiv>\n                <div style=\"margin-top:10px\"><span style=\"{{ q.bestStyle }}\">{{ q.bestIcon }} {{ q.bestExam }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin:34px 4px 14px\">\n          <span style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.16em;color:var(--faint)\">RĂSFOIEȘTE · {{ countChapters }} CAPITOLE<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:11px\">\n          <sc-for list=\"{{ chaptersVM }}\" as=\"ch\" hint-placeholder-count=\"8\">\n            <div role=\"button\" onclick=\"{{ ch.onOpen }}\" style=\"background:{{ ch.cardBg }};border:1px solid {{ ch.cardBorder }};border-radius:16px;padding:15px 15px 14px;cursor:pointer;display:flex;flex-direction:column;min-height:104px;transition:transform .12s\" style-hover=\"transform:translateY(-2px)\">\n              <span style=\"font:700 16px/1.15 'Space Grotesk',sans-serif;color:{{ ch.nameColor }}\">{{ ch.name }}<\u002Fspan>\n              <div style=\"display:flex;gap:4px;margin-top:10px\">\n                <sc-for list=\"{{ ch.dots }}\" as=\"d\" hint-placeholder-count=\"3\"><span style=\"{{ d.style }}\"><\u002Fspan><\u002Fsc-for>\n              <\u002Fdiv>\n              <span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:{{ ch.metaColor }};margin-top:auto;padding-top:10px\">{{ ch.meta }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <footer style=\"margin:40px 4px 0;padding-top:20px;border-top:1px solid var(--border)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin:0 0 12px\">\n            <span style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.16em;color:var(--faint)\">SURSĂ &amp; INFORMAȚII<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:12.5px;line-height:1.6;color:var(--faint);margin:0 0 12px;max-width:560px\">Conținut adaptat după <span style=\"color:var(--muted)\">Ghidul de utilizare a investigațiilor radiologice și imagistice medicale<\u002Fspan> — Ministerul Sănătății. Instrument de suport decizional; nu înlocuiește judecata clinică.<\u002Fp>\n          <div style=\"display:flex;justify-content:center;margin-top:2px\"><button onclick=\"{{ openAbout }}\" style=\"border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:11px;padding:9px 14px;font:600 12.5px 'Space Grotesk',sans-serif;cursor:pointer\" style-hover=\"border-color:var(--accent-border);color:var(--text)\">Despre IRIS și sursa oficială<\u002Fbutton><\u002Fdiv>\n        <\u002Ffooter>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isSearch }}\">\n      <div style=\";padding-top:20px\">\n        <div style=\"display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--accent-border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)\">\n          <span style=\"color:var(--accent);font-size:18px\">⌕<\u002Fspan>\n          <input ref=\"{{ inputRef }}\" value=\"{{ query }}\" oninput=\"{{ onInput }}\" placeholder=\"Caută simptom, examen sau fragment de cuvânt…\" style=\"flex:1;border:0;outline:0;background:transparent;color:var(--text);font-size:16px\">\n          <sc-if value=\"{{ hasQuery }}\"><button onclick=\"{{ clearQuery }}\" style=\"border:0;background:transparent;color:var(--faint);font-size:18px;cursor:pointer\">✕<\u002Fbutton><\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ aiAvailable }}\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:11px\">\n          <button onclick=\"{{ onAI }}\" style=\"{{ aiBtnStyle }}\"><span style=\"{{ aiSpinStyle }}\"><\u002Fspan>✨ Interpretează cu AI<\u002Fbutton>\n          <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:var(--faint)\">{{ aiHint }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ aiNote }}\">\n          <div style=\"margin-top:11px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:12px;padding:11px 13px;font-size:13px;color:var(--text)\">✨ {{ aiNote }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- empty state -->\n        <sc-if value=\"{{ showSearchIntro }}\">\n          <div style=\"margin-top:26px\">\n            <div style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.14em;color:var(--faint);margin-bottom:12px\">ÎNCEARCĂ<\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n              <sc-for list=\"{{ exampleChips }}\" as=\"c\" hint-placeholder-count=\"6\"><button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin-top:22px;font-size:13.5px;line-height:1.6;color:var(--muted);max-width:520px\">Poți căuta liber — în română, engleză sau termeni uzuali. Este suficient un fragment de cuvânt: Iris găsește potriviri parțiale, înțelege sinonime și corectează greșeli de tastare. Caută și în comentarii și în denumirile examenelor.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- results -->\n        <sc-if value=\"{{ hasResults }}\">\n          <div style=\"font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:22px 2px 12px\">{{ resultLabel }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ resultsVM }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div role=\"button\" onclick=\"{{ r.onOpen }}\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:15px 16px;cursor:pointer\" style-hover=\"border-color:var(--accent-border)\">\n                <div style=\"font:500 10px 'IBM Plex Mono',monospace;color:var(--faint);letter-spacing:.04em;margin-bottom:6px\">{{ r.crumb }}<\u002Fdiv>\n                <div style=\"font:600 16px/1.25 'Space Grotesk',sans-serif;color:var(--text)\">{{ r.name }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap\">\n                  <span style=\"{{ r.bestStyle }}\">{{ r.bestIcon }} {{ r.bestExam }}<\u002Fspan>\n                  <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:var(--faint)\">{{ r.recMeta }}<\u002Fspan>\n                  <span style=\"margin-left:auto;display:flex;gap:4px\"><sc-for list=\"{{ r.dots }}\" as=\"d\" hint-placeholder-count=\"3\"><span style=\"{{ d.style }}\"><\u002Fspan><\u002Fsc-for><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noResults }}\">\n          <div style=\"margin-top:40px;text-align:center;color:var(--muted)\">\n            <div style=\"font-size:30px;margin-bottom:10px;opacity:.5\">⌕<\u002Fdiv>\n            <div style=\"font:600 16px 'Space Grotesk',sans-serif;color:var(--text)\">Niciun rezultat pentru „{{ query }}\"<\u002Fdiv>\n            <p style=\"font-size:13.5px;margin-top:8px\">Încearcă alți termeni<sc-if value=\"{{ aiAvailable }}\">, sau apasă „Interpretează cu AI\"<\u002Fsc-if>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ CHAPTER ============ -->\n      <sc-if value=\"{{ isChapter }}\">\n      <div style=\"\">\n        <div data-noprint=\"\" style=\"display:flex;align-items:center;gap:9px;padding:20px 2px 4px\"><button onclick=\"{{ goHome }}\" style=\"border:0;background:transparent;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0;display:inline-flex;align-items:center\">‹<\u002Fbutton><span style=\"font:500 11px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--faint);line-height:1\">CAPITOL<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font:700 28px/1.1 'Space Grotesk',sans-serif;margin:8px 2px 4px;letter-spacing:-.01em\">{{ curChapterName }}<\u002Fh2>\n        <div style=\"font:500 12px 'IBM Plex Mono',monospace;color:var(--faint);margin:0 2px 20px\">{{ curChapterMeta }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ subsVM }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div role=\"button\" onclick=\"{{ s.onOpen }}\" style=\"display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 16px;cursor:pointer\" style-hover=\"border-color:var(--accent-border)\">\n              <span style=\"font:600 12px 'IBM Plex Mono',monospace;color:var(--faint);width:24px\">{{ s.num }}<\u002Fspan>\n              <span style=\"font:500 16px 'Space Grotesk',sans-serif;flex:1\">{{ s.name }}<\u002Fspan>\n              <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:var(--faint)\">{{ s.count }}<\u002Fspan>\n              <span style=\"color:var(--faint);font-size:16px\">›<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SUBCHAPTER ============ -->\n      <sc-if value=\"{{ isSub }}\">\n      <div style=\"\">\n        <div data-noprint=\"\" style=\"display:flex;align-items:center;gap:8px;padding:20px 2px 4px\"><button onclick=\"{{ backToChapter }}\" style=\"border:0;background:transparent;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0;display:inline-flex;align-items:center\">‹<\u002Fbutton><div style=\"display:flex;align-items:center;flex-wrap:wrap;line-height:1.5\"><sc-for list=\"{{ subCrumbs }}\" as=\"cr\" hint-placeholder-count=\"1\"><sc-if value=\"{{ cr.sep }}\"><span style=\"color:var(--faint);opacity:.5;margin:0 5px;font:500 11px 'IBM Plex Mono',monospace\">/<\u002Fspan><\u002Fsc-if><span role=\"button\" onclick=\"{{ cr.onClick }}\" style=\"font:500 11px 'IBM Plex Mono',monospace;letter-spacing:.05em;color:var(--faint);cursor:pointer\" style-hover=\"color:var(--accent)\">{{ cr.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <h2 style=\"font:700 26px/1.12 'Space Grotesk',sans-serif;margin:8px 2px 4px;letter-spacing:-.01em\">{{ curSubName }}<\u002Fh2>\n        <div style=\"font:500 12px 'IBM Plex Mono',monospace;color:var(--faint);margin:0 2px 20px\">{{ curSubMeta }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ sitsVM }}\" as=\"q\" hint-placeholder-count=\"8\">\n            <div role=\"button\" onclick=\"{{ q.onOpen }}\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:15px 16px;cursor:pointer\" style-hover=\"border-color:var(--accent-border)\">\n              <div style=\"font:600 15.5px/1.3 'Space Grotesk',sans-serif\">{{ q.name }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap\">\n                <span style=\"{{ q.bestStyle }}\">{{ q.bestIcon }} {{ q.bestExam }}<\u002Fspan>\n                <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:var(--faint)\">{{ q.recMeta }}<\u002Fspan>\n                <span style=\"margin-left:auto;display:flex;gap:4px\"><sc-for list=\"{{ q.dots }}\" as=\"d\" hint-placeholder-count=\"3\"><span style=\"{{ d.style }}\"><\u002Fspan><\u002Fsc-for><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SITUATION DETAIL ============ -->\n      <sc-if value=\"{{ isSit }}\">\n      <div style=\"\">\n        <div data-printonly=\"\" style=\"display:none;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #000\">\n          <div style=\"display:flex;align-items:baseline;gap:10px\"><span style=\"font:700 22px 'Space Grotesk',sans-serif;letter-spacing:.14em;color:#000\">IRIS<\u002Fspan><span style=\"font:500 11px 'IBM Plex Mono',monospace;color:#333\">Indicații radioimagistice structurate<\u002Fspan><\u002Fdiv>\n          <div style=\"font:500 11px 'IBM Plex Mono',monospace;color:#444;margin-top:8px\">{{ sitPrintCrumb }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-noprint=\"\" style=\"display:flex;align-items:center;gap:8px;padding:20px 2px 4px\"><button onclick=\"{{ backToSub }}\" style=\"border:0;background:transparent;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0;display:inline-flex;align-items:center\">‹<\u002Fbutton><div style=\"display:flex;align-items:center;flex-wrap:wrap;line-height:1.5\"><sc-for list=\"{{ sitCrumbs }}\" as=\"cr\" hint-placeholder-count=\"2\"><sc-if value=\"{{ cr.sep }}\"><span style=\"color:var(--faint);opacity:.5;margin:0 5px;font:500 11px 'IBM Plex Mono',monospace\">/<\u002Fspan><\u002Fsc-if><span role=\"button\" onclick=\"{{ cr.onClick }}\" style=\"font:500 11px 'IBM Plex Mono',monospace;letter-spacing:.05em;color:var(--faint);cursor:pointer\" style-hover=\"color:var(--accent)\">{{ cr.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <h2 style=\"font:700 27px/1.14 'Space Grotesk',sans-serif;margin:10px 2px 16px;letter-spacing:-.01em\">{{ curSitName }}<\u002Fh2>\n        <div data-noprint=\"\" style=\"display:flex;gap:8px;margin:0 0 22px;flex-wrap:nowrap;overflow-x:auto\">\n          <button onclick=\"{{ toggleFav }}\" style=\"{{ favBtnStyle }}\">{{ favIcon }} {{ favLabel }}<\u002Fbutton>\n          <button onclick=\"{{ doShare }}\" style=\"display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:11px;padding:9px 14px;font:600 13px 'Space Grotesk',sans-serif;cursor:pointer\">⤴ Distribuie<\u002Fbutton>\n          <button onclick=\"{{ doPrint }}\" style=\"display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:11px;padding:9px 14px;font:600 13px 'Space Grotesk',sans-serif;cursor:pointer\">⎙ Printează<\u002Fbutton>\n          <button onclick=\"{{ togglePregnancy }}\" style=\"{{ pregBtnStyle }}\" title=\"Evidențiază investigațiile care implică iradiere\">⚠ Sarcină<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ pregnancy }}\">\n          <div data-noprint=\"\" style=\"display:flex;align-items:flex-start;gap:9px;margin:0 0 16px;padding:12px 14px;border-radius:12px;background:oklch(0.5 0.12 20 / .1);border:1px solid oklch(0.6 0.12 20 / .3)\">\n            <span style=\"font-size:15px;line-height:1.3;flex:0 0 auto\">⚠<\u002Fspan>\n            <span style=\"font-size:12.5px;line-height:1.55;color:var(--text);opacity:.9\">Mod sarcină: investigațiile care implică radiații ionizante sunt marcate. Preferă alternativele fără iradiere când sunt adecvate clinic; decizia finală ține cont de raportul risc/beneficiu.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showFreeNudge }}\">\n          <div data-noprint=\"\" style=\"display:flex;align-items:center;gap:9px;margin:0 0 16px;padding:11px 14px;border-radius:12px;background:oklch(0.55 0.11 155 / .12);border:1px solid oklch(0.6 0.12 155 / .32)\">\n            <span style=\"font-size:14px;flex:0 0 auto\">◇<\u002Fspan>\n            <span style=\"font-size:12.5px;line-height:1.5;color:var(--text);opacity:.92\">Există o alternativă fără iradiere: <strong style=\"font-weight:600\">{{ freeNudgeExam }}<\u002Fstrong><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <sc-for list=\"{{ recsVM }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div data-rec=\"\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:17px 17px 16px;position:relative;overflow:hidden\">\n              <div style=\"position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:3px;background:{{ r.barColor }}\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><span style=\"{{ r.chipStyle }}\">{{ r.tipShort }}<\u002Fspan><span style=\"font:600 16px 'Space Grotesk',sans-serif\">{{ r.exam }}<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{ r.hasGrade }}\"><span style=\"font:700 10px 'IBM Plex Mono',monospace;border:1px solid var(--border);color:var(--muted);padding:5px 8px;border-radius:7px;white-space:nowrap\" title=\"{{ r.gradeTitle }}\">GRAD {{ r.grade }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:12px;{{ r.badgeStyle }}\">{{ r.indIcon }} {{ r.indication }}<\u002Fdiv>\n                            <sc-if value=\"{{ r.hasComments }}\"><p style=\"font-size:13.5px;line-height:1.6;color:var(--text);opacity:.86;margin:13px 0 0;white-space:pre-line\">{{ r.comments }}<\u002Fp><\u002Fsc-if>\n              <sc-if value=\"{{ r.hasOther }}\"><div style=\"margin-top:12px;background:var(--surface-2);border-radius:11px;padding:11px 13px\"><div style=\"font:600 9.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:var(--faint);margin-bottom:5px\">ALTE INFORMAȚII<\u002Fdiv><p style=\"font-size:12.5px;line-height:1.55;color:var(--muted);margin:0;white-space:pre-line\">{{ r.otherInfo }}<\u002Fp><\u002Fdiv><\u002Fsc-if>\n              <sc-if value=\"{{ r.hasDose }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:13px;border-top:1px solid var(--border)\">\n                <div style=\"display:flex;gap:3px\"><sc-for list=\"{{ r.doseSegs }}\" as=\"s\" hint-placeholder-count=\"5\"><span style=\"{{ s.style }}\"><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                <span style=\"font:600 10.5px 'IBM Plex Mono',monospace;letter-spacing:.03em;white-space:nowrap;color:{{ r.doseColor }}\">{{ r.doseLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.pregWarn }}\"><div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 11px;border-radius:9px;background:oklch(0.5 0.12 20 / .14);border:1px solid oklch(0.6 0.12 20 / .34);color:oklch(0.72 0.15 20);font:600 11px 'IBM Plex Mono',monospace\">⚠ IMPLICĂ IRADIERE<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div data-printonly=\"\" style=\"display:none;margin-top:20px;padding-top:10px;border-top:1px solid #000;font:500 10px/1.55 'IBM Plex Mono',monospace;color:#333\">IRIS — Indicații radioimagistice structurate, adaptat după Ghidul de utilizare a investigațiilor radiologice și imagistice medicale (Ministerul Sănătății). Instrument de suport decizional — nu înlocuiește judecata clinică sau consultul de specialitate.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ FAVORITES ============ -->\n      <sc-if value=\"{{ isFavs }}\">\n      <div style=\"\">\n        <div style=\"padding:22px 2px 4px\"><span style=\"font:500 11px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:var(--faint)\">SALVATE<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font:700 26px 'Space Grotesk',sans-serif;margin:8px 2px 20px;letter-spacing:-.01em\">Situații salvate<\u002Fh2>\n        <sc-if value=\"{{ hasFavs }}\">\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ favsVM }}\" as=\"q\" hint-placeholder-count=\"3\">\n              <div role=\"button\" onclick=\"{{ q.onOpen }}\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:15px 16px;cursor:pointer\" style-hover=\"border-color:var(--accent-border)\">\n                <div style=\"font:500 10px 'IBM Plex Mono',monospace;color:var(--faint);margin-bottom:6px\">{{ q.crumb }}<\u002Fdiv>\n                <div style=\"font:600 15.5px/1.3 'Space Grotesk',sans-serif\">{{ q.name }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px\"><span style=\"{{ q.bestStyle }}\">{{ q.bestIcon }} {{ q.bestExam }}<\u002Fspan><span style=\"font:500 11px 'IBM Plex Mono',monospace;color:var(--faint)\">{{ q.recMeta }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noFavs }}\">\n          <div style=\"margin-top:44px;text-align:center;color:var(--muted)\"><div style=\"font-size:30px;opacity:.4;margin-bottom:10px\">★<\u002Fdiv><div style=\"font:600 16px 'Space Grotesk',sans-serif;color:var(--text)\">Nicio situație salvată<\u002Fdiv><p style=\"font-size:13.5px;margin-top:8px\">Apasă ★ pe o situație clinică pentru a o salva aici.<\u002Fp><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n\n    <!-- ===== BOTTOM NAV ===== -->\n    <nav data-noprint=\"\" style=\"position:sticky;bottom:0;z-index:30;display:flex;background:color-mix(in srgb, var(--bg) 88%, transparent);backdrop-filter:blur(14px);border-top:1px solid var(--border)\">\n      <button onclick=\"{{ goHome }}\" style=\"{{ navHomeStyle }}\"><span style=\"font-size:17px\">⌂<\u002Fspan><span style=\"font:600 9.5px 'IBM Plex Mono',monospace;letter-spacing:.06em\">ACASĂ<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ goSearch }}\" style=\"{{ navSearchStyle }}\"><span style=\"font-size:17px\">⌕<\u002Fspan><span style=\"font:600 9.5px 'IBM Plex Mono',monospace;letter-spacing:.06em\">CAUTĂ<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ goFavs }}\" style=\"{{ navFavStyle }}\"><span style=\"font-size:15px\">★<\u002Fspan><span style=\"font:600 9.5px 'IBM Plex Mono',monospace;letter-spacing:.06em\">SALVATE{{ favBadge }}<\u002Fspan><\u002Fbutton>\n    <\u002Fnav>\n\n    <!-- ===== TOAST ===== -->\n    <sc-if value=\"{{ toast }}\">\n      <div data-noprint=\"\" style=\"position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:60;background:var(--accent);color:var(--accent-ink);font:600 13px 'Space Grotesk',sans-serif;padding:11px 18px;border-radius:12px;box-shadow:var(--shadow)\">{{ toast }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== INSTALL PROMPT (Android/Chrome) ===== -->\n    <sc-if value=\"{{ updateReady }}\">\n      <div data-noprint=\"\" style=\"position:fixed;left:12px;right:12px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:70;background:var(--surface);border:1px solid var(--accent-border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 12px 32px rgba(0,0,0,.3);max-width:440px;margin:0 auto\">\n        <div style=\"width:38px;height:38px;border-radius:10px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto\">↻<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\"><div style=\"font:600 13.5px 'Space Grotesk',sans-serif;color:var(--text)\">Actualizare disponibilă<\u002Fdiv><div style=\"font-size:11.5px;color:var(--faint);margin-top:2px\">O versiune nouă a aplicației e pregătită.<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ applyUpdate }}\" style=\"background:var(--accent);color:var(--accent-ink);border:none;border-radius:10px;padding:9px 14px;font:600 12.5px 'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap\">Reîncarcă<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ installReady }}\">\n      <div data-noprint=\"\" style=\"position:fixed;left:12px;right:12px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:70;background:var(--surface);border:1px solid var(--accent-border);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px;display:flex;align-items:center;gap:13px;max-width:520px;margin:0 auto\">\n        <div style=\"width:38px;height:38px;border-radius:10px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto\">⤓<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\"><div style=\"font:600 14px 'Space Grotesk',sans-serif;color:var(--text)\">Instalează IRIS<\u002Fdiv><div style=\"font-size:11.5px;color:var(--muted);margin-top:1px\">Acces rapid, offline, ecran complet<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ dismissInstall }}\" style=\"border:0;background:transparent;color:var(--faint);font-size:13px;cursor:pointer;padding:6px 4px\">Nu acum<\u002Fbutton>\n        <button onclick=\"{{ doInstall }}\" style=\"border:0;background:var(--accent);color:var(--accent-ink);font:600 13px 'Space Grotesk',sans-serif;padding:9px 16px;border-radius:11px;cursor:pointer;flex:0 0 auto\">Instalează<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== INSTALL HINT (iOS Safari) ===== -->\n    <sc-if value=\"{{ iosInstall }}\">\n      <div data-noprint=\"\" style=\"position:fixed;left:12px;right:12px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:70;background:var(--surface);border:1px solid var(--accent-border);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px;display:flex;align-items:center;gap:13px;max-width:520px;margin:0 auto\">\n        <div style=\"width:38px;height:38px;border-radius:10px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto\">⎋<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\"><div style=\"font:600 14px 'Space Grotesk',sans-serif;color:var(--text)\">Adaugă IRIS pe ecranul principal<\u002Fdiv><div style=\"font-size:11.5px;color:var(--muted);margin-top:1px\">Apasă <b style=\"color:var(--text)\">Partajează ⎋<\u002Fb> apoi <b style=\"color:var(--text)\">Adaugă la ecranul principal<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ dismissInstall }}\" style=\"border:0;background:transparent;color:var(--faint);font-size:16px;cursor:pointer;padding:6px 4px;flex:0 0 auto\">✕<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== LEGEND OVERLAY ===== -->\n    <sc-if value=\"{{ legendOpen }}\">\n      <div data-noprint=\"\" onclick=\"{{ closeLegend }}\" style=\"position:fixed;inset:0;z-index:80;background:var(--overlay);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 16px max(20px,env(safe-area-inset-bottom))\" style-hover=\"\">\n        <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:540px;max-height:100%;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--border);flex:0 0 auto\"><h3 style=\"font:700 20px 'Space Grotesk',sans-serif;margin:0\">Legendă<\u002Fh3><button onclick=\"{{ closeLegend }}\" style=\"width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);font-size:16px;cursor:pointer\">✕<\u002Fbutton><\u002Fdiv>\n          <div style=\"overflow-x:hidden;overflow-y:auto;padding:18px 22px 24px\">\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:6px 0 10px\">RECOMANDARE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:20px\">\n            <sc-for list=\"{{ legendInd }}\" as=\"l\" hint-placeholder-count=\"5\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"{{ l.badgeStyle }}\">{{ l.icon }} {{ l.name }}<\u002Fspan><span style=\"font-size:12.5px;color:var(--muted);flex:1\">{{ l.desc }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:0 0 10px\">DOZĂ DE IRADIERE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:20px\">\n            <sc-for list=\"{{ legendDose }}\" as=\"d\" hint-placeholder-count=\"5\"><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><div style=\"display:flex;gap:3px;width:97px;flex:0 0 auto\">{{ d.segsEl }}<\u002Fdiv><span style=\"font:600 12px 'Space Grotesk',sans-serif;color:{{ d.color }};flex:0 0 auto\">{{ d.band }}<\u002Fspan><span style=\"font-size:12px;color:var(--muted)\">{{ d.est }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:0 0 10px\">TIP INVESTIGAȚIE<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px\">\n            <sc-for list=\"{{ legendMod }}\" as=\"m\" hint-placeholder-count=\"10\"><div style=\"display:flex;align-items:center;gap:9px\"><span style=\"{{ m.chipStyle }}\">{{ m.short }}<\u002Fspan><span style=\"font-size:12.5px;color:var(--text)\">{{ m.name }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:16px 0 8px\">GRAD RECOMANDARE<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--muted);line-height:1.7\">A — dovezi solide · B — dovezi moderate · C — consens / dovezi limitate<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== ABOUT / SOURCE OVERLAY ===== -->\n    <sc-if value=\"{{ aboutOpen }}\">\n      <div data-noprint=\"\" onclick=\"{{ closeAbout }}\" style=\"position:fixed;inset:0;z-index:80;background:var(--overlay);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 16px max(20px,env(safe-area-inset-bottom))\">\n        <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:540px;max-height:100%;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--border);flex:0 0 auto\"><h3 style=\"font:700 20px 'Space Grotesk',sans-serif;margin:0\">Despre IRIS<\u002Fh3><button onclick=\"{{ closeAbout }}\" style=\"width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);font-size:16px;cursor:pointer\">✕<\u002Fbutton><\u002Fdiv>\n          <div style=\"overflow:auto;padding:18px 22px 24px\">\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:6px 0 8px\">DESPRE GHIDUL OFICIAL<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.65;color:var(--text);opacity:.9;margin:0 0 18px\">IRIS transpune indicațiile din ghidul oficial de utilizare a investigațiilor radiologice și imagistice medicale într-un format digital ușor de utilizat. Ne ghidează două principii: alegerea investigației potrivite pentru fiecare situație clinică, la momentul potrivit, și preferința, pe cât posibil, a tehnicilor neiradiante.<\u002Fp>\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:0 0 8px\">CUI SE ADRESEAZĂ<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.65;color:var(--text);opacity:.9;margin:0 0 18px\">Destinat profesioniștilor din sănătate ca instrument de suport decizional. Recomandările sunt orientative, nu reguli intangibile, și nu acoperă supraspecializările; ele trebuie corelate cu dotarea tehnică locală, experiența disponibilă și statusul pacientului. Decizia finală asupra examinării revine medicului radiolog / de medicină nucleară.<\u002Fp>\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:0 0 10px\">SURSĂ<\u002Fdiv>\n          <a href=\"{{ sourceUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px 15px;text-decoration:none;color:inherit\" style-hover=\"border-color:var(--accent-border)\">\n            <span style=\"font-size:20px;color:var(--accent)\">⎋<\u002Fspan>\n            <span style=\"flex:1\"><span style=\"display:block;font:600 13.5px 'Space Grotesk',sans-serif;color:var(--text)\">Ghid de utilizare a investigațiilor radiologice și imagistice medicale<\u002Fspan><span style=\"display:block;font:500 11px 'IBM Plex Mono',monospace;color:var(--faint);margin-top:4px\">Ministerul Sănătății · PDF · document extern<\u002Fspan><\u002Fspan>\n            <span style=\"color:var(--faint);font-size:16px\">›<\u002Fspan>\n          <\u002Fa>\n\n          <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--faint);margin:20px 0 10px\">APLICAȚIE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:12px\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;font-size:13px;color:var(--text)\"><span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:var(--faint);width:88px;flex:0 0 auto\">Mentenanță<\u002Fspan><span>Dr. Costin Stroie<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:8px;font-size:13px;color:var(--text)\"><span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:var(--faint);width:88px;flex:0 0 auto\">Contact<\u002Fspan><a href=\"mailto:costinstroie@eridu.eu.org\" style=\"color:var(--accent);text-decoration:none\">costinstroie@eridu.eu.org<\u002Fa><\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:8px;font-size:13px;color:var(--text)\"><span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:var(--faint);width:88px;flex:0 0 auto\">Licență<\u002Fspan><span>GPL-3.0<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"{{ repoUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px 15px;text-decoration:none;color:inherit\" style-hover=\"border-color:var(--accent-border)\">\n            <span style=\"font-size:20px;color:var(--accent)\">⌥<\u002Fspan>\n            <span style=\"flex:1\"><span style=\"display:block;font:600 13.5px 'Space Grotesk',sans-serif;color:var(--text)\">Cod sursă pe GitHub<\u002Fspan><span style=\"display:block;font:500 11px 'IBM Plex Mono',monospace;color:var(--faint);margin-top:4px\">github.com/cstroie/iris<\u002Fspan><\u002Fspan>\n            <span style=\"color:var(--faint);font-size:16px\">›<\u002Fspan>\n          <\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aspect&quot;,&quot;options&quot;:[&quot;oklch(0.86 0.2 128)&quot;,&quot;oklch(0.78 0.16 200)&quot;,&quot;oklch(0.8 0.17 85)&quot;,&quot;oklch(0.72 0.17 25)&quot;]},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aspect&quot;}}\">\nclass Component extends DCLogic {\n  state = { view:'home', theme:'dark', chapterId:null, subId:null, sitId:null, query:'', results:[], favs:[], recent:[], access:{}, toast:'', legendOpen:false, aboutOpen:false, aiBusy:false, aiNote:'', updateReady:false, pregnancy:false };\n\n  // ---------- lifecycle ----------\n  componentDidMount(){ this._tries=0; this.initData(); this.initInstall(); this.initHistory(); this.initUpdate(); }\n  initUpdate(){\n    this._upd=()=>this.setState({updateReady:true});\n    window.addEventListener('iris-update-ready', this._upd);\n  }\n  applyUpdate=()=>{ try{ location.reload(); }catch(e){} };\n  initInstall(){\n    // already installed (standalone display) → never prompt\n    const standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true;\n    let dismissed=false; try{ dismissed = localStorage.getItem('iris.installDismissed')==='1'; }catch(e){}\n    if(standalone || dismissed) return;\n    // Android/Chrome: capture the native prompt\n    this._bip=(e)=>{ e.preventDefault(); this._deferred=e; this.setState({installReady:true}); };\n    window.addEventListener('beforeinstallprompt', this._bip);\n    this._installed=()=>{ this._deferred=null; this.setState({installReady:false, iosInstall:false}); };\n    window.addEventListener('appinstalled', this._installed);\n    // iOS Safari: no API — show manual hint\n    const ua=navigator.userAgent||'';\n    const isIOS=/iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);\n    const isSafari=/^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(ua);\n    if(isIOS && isSafari) this.setState({iosInstall:true});\n  }\n  doInstall=async ()=>{\n    if(!this._deferred) return;\n    this._deferred.prompt();\n    try{ await this._deferred.userChoice; }catch(e){}\n    this._deferred=null; this.setState({installReady:false});\n  };\n  dismissInstall=()=>{ try{ localStorage.setItem('iris.installDismissed','1'); }catch(e){} this.setState({installReady:false, iosInstall:false}); };\n  initData(){\n    if(!window.IRIS || !window.IRIS.chapters || !window.IRIS.chapters.length){\n      if(this._tries++ < 60){ setTimeout(()=>this.initData(), 50); return; }\n    }\n    const D = window.IRIS || {chapters:[],subchapters:[],situations:[],recommendations:[],legend:{},synonyms:[]};\n    this.D = D;\n    this.chById = new Map(D.chapters.map(c=>[c.id,c]));\n    this.subById = new Map(D.subchapters.map(s=>[s.id,s]));\n    this.sitById = new Map(D.situations.map(s=>[s.id,s]));\n    this.subsByChap = new Map(); D.subchapters.forEach(s=>{(this.subsByChap.get(s.chapterId)||this.subsByChap.set(s.chapterId,[]).get(s.chapterId)).push(s);});\n    this.sitsBySub = new Map(); D.situations.forEach(s=>{ if(s.placeholder) return; (this.sitsBySub.get(s.subchapterId)||this.sitsBySub.set(s.subchapterId,[]).get(s.subchapterId)).push(s);});\n    this.recsBySit = new Map(); D.recommendations.forEach(r=>{(this.recsBySit.get(r.situationId)||this.recsBySit.set(r.situationId,[]).get(r.situationId)).push(r);});\n    // search index\n    this.index = D.situations.filter(s=>!s.placeholder).map(s=>{\n      const ch=this.chById.get(s.chapterId), sub=this.subById.get(s.subchapterId);\n      const recs=this.recsBySit.get(s.id)||[];\n      const nameHay=this.norm([s.name,sub&&sub.name,ch&&ch.name].filter(Boolean).join(' '));\n      const bodyHay=this.norm(recs.map(r=>r.exam+' '+r.comments+' '+r.otherInfo).join(' '));\n      return {sit:s, chName:ch?ch.name:'', subName:sub?sub.name:'', name:nameHay, nameWords:nameHay.split(/\\s+/), body:bodyHay};\n    });\n    // restore prefs\n    try{ const t=localStorage.getItem('iris.theme'); if(t) this.state.theme=t; }catch(e){}\n    try{ const f=JSON.parse(localStorage.getItem('iris.favs')||'[]'); if(Array.isArray(f)) this.state.favs=f; }catch(e){}\n    try{ const r=JSON.parse(localStorage.getItem('iris.recent')||'[]'); if(Array.isArray(r)) this.state.recent=r; }catch(e){}\n    try{ const a=JSON.parse(localStorage.getItem('iris.access')||'{}'); if(a&&typeof a==='object') this.state.access=a; }catch(e){}\n    if(this.props.defaultTheme && !localStorage.getItem('iris.theme')) this.state.theme=this.props.defaultTheme;\n    this.applyRoot();\n    this.forceUpdate();\n    // keyboard: \"/\" focuses search\n    this._key=(e)=>{ if(e.key==='/' && !/input|textarea/i.test(e.target.tagName)){ e.preventDefault(); this.goSearch(); } };\n    window.addEventListener('keydown',this._key);\n  }\n  componentWillUnmount(){ window.removeEventListener('keydown',this._key); if(this._bip)window.removeEventListener('beforeinstallprompt',this._bip); if(this._installed)window.removeEventListener('appinstalled',this._installed); if(this._pop)window.removeEventListener('popstate',this._pop); if(this._upd)window.removeEventListener('iris-update-ready',this._upd); }\n  componentDidUpdate(){ this.applyRoot(); }\n  applyRoot(){ if(this.root){ this.root.setAttribute('data-theme', this.state.theme); const a=this.props.accent; if(a) this.root.style.setProperty('--accent', a); } }\n\n  // ---------- helpers ----------\n  norm(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9\\s]/g,' ').replace(/\\s+/g,' ').trim(); }\n  get light(){ return this.state.theme==='light'; }\n  HUE={G:220,E:180,T:260,M:300,N:340,X:60,A:20,I:140,D:100,Z:null};\n  HERO=['Investigația potrivită, la momentul potrivit.','Examenul imagistic potrivit, de fiecare dată.','Ce investigație cauți?','De la situația clinică, la investigația potrivită.','Pornește de la simptom. Găsește investigația.','Indicația imagistică. Clarificată.','Mai puține investigații inutile. Mai puțină iradiere.','Găsește investigația imagistică adecvată.'];\n  BANDS=['Fără iradiere','Foarte redusă','Redusă','Medie','Ridicată'];\n  GRADE={A:'dovezi solide',B:'dovezi moderate',C:'consens / dovezi limitate'};\n  chipStyle(tip){\n    const H=this.HUE[tip], base='font:700 10px \\'IBM Plex Mono\\',monospace;padding:5px 8px;border-radius:7px;white-space:nowrap;letter-spacing:.02em;';\n    if(H==null) return base+(this.light?'background:#e7e9e3;color:#4b5563':'background:#1b1f26;color:#8b93a2');\n    return base+(this.light?`background:oklch(0.95 0.05 ${H});border:1px solid oklch(0.85 0.08 ${H});color:oklch(0.4 0.16 ${H})`:`background:oklch(0.28 0.07 ${H});color:oklch(0.84 0.14 ${H})`);\n  }\n  tipShort(tip){ const m=this.D.legend.modality; return (m&&m.values[tip])?m.values[tip].short:tip; }\n  tipName(tip){ const m=this.D.legend.modality; return (m&&m.values[tip])?m.values[tip].name:tip; }\n  dot(tip){ const H=this.HUE[tip]; const c=H==null?(this.light?'#b6bcc4':'#4a515c'):`oklch(0.68 0.19 ${H})`; return `width:7px;height:7px;border-radius:50%;background:${c};flex:0 0 auto`; }\n  dotOnAccent(tip){ const H=this.HUE[tip]; const c=H==null?'var(--accent-ink)':`oklch(0.4 0.19 ${H})`; return `width:7px;height:7px;border-radius:50%;background:${c};opacity:.8;flex:0 0 auto`; }\n  IND={\n    'Indicat':{h:150,icon:'●'},\n    'Doar în cazuri particulare':{h:88,icon:'◕'},\n    'Doar cu aviz specializat':{h:45,icon:'◑'},\n    'Este necesară justificare detaliată':{h:305,icon:'✎'},\n    'Neindicat în primă intenție':{h:35,icon:'◔'},\n    'Neindicat':{h:20,icon:'⊘'},\n    'Vezi Detalii Ghid!':{h:245,icon:'ⓘ'}\n  };\n  indMeta(ind){ return this.IND[ind]||{h:245,icon:'ⓘ'}; }\n  indIcon(ind){ return this.indMeta(ind).icon; }\n  badgeStyle(ind,size){\n    const H=this.indMeta(ind).h; const pad=size==='sm'?'4px 9px':'6px 11px'; const fs=size==='sm'?'11px':'12.5px';\n    const c=this.light?`background:oklch(0.95 0.05 ${H});border:1px solid oklch(0.8 0.1 ${H});color:oklch(0.4 0.17 ${H})`\n                      :`background:oklch(0.25 0.06 ${H});border:1px solid oklch(0.38 0.09 ${H});color:oklch(0.84 0.15 ${H})`;\n    return `${c};padding:${pad};border-radius:9px;font:600 ${fs} 'Space Grotesk',sans-serif;white-space:nowrap`;\n  }\n  badgeBar(ind){ const H=this.indMeta(ind).h; return this.light?`oklch(0.58 0.17 ${H})`:`oklch(0.72 0.16 ${H})`; }\n  doseFill(level){ const H={0:150,1:128,2:78,3:45,4:26}[level]; return this.light?`oklch(0.58 0.17 ${H})`:`oklch(0.76 0.17 ${H})`; }\n  doseTextColor(level){ const H={0:150,1:128,2:78,3:45,4:26}[level]; return this.light?`oklch(0.46 0.16 ${H})`:`oklch(0.8 0.15 ${H})`; }\n  doseSegs(level){ const fill=this.doseFill(level); const arr=[]; for(let i=0;i<5;i++){ const on=i<level; arr.push({style:`width:17px;height:7px;border-radius:2px;background:${on?fill:'var(--dose-empty)'}`}); } return arr; }\n  doseInfo(r){\n    if(r.doseMin==null && r.doseMax==null) return {hasDose:false};\n    const lvl = r.doseMax!=null?r.doseMax:r.doseMin;\n    const mn = r.doseMin!=null?r.doseMin:lvl;\n    const band=this.BANDS[lvl]||'';\n    let label;\n    if(lvl===0) label='FĂRĂ IRADIERE';\n    else if(mn!==lvl && this.BANDS[mn]) label=`IRADIERE ${this.BANDS[mn].toUpperCase()}–${band.toUpperCase()}`;\n    else label=`IRADIERE ${band.toUpperCase()}`;\n    return {hasDose:true, level:lvl, segs:this.doseSegs(lvl), color:this.doseTextColor(lvl), label};\n  }\n  bestRec(recs){ // most-indicated (lowest tier)\n    const tier=r=>{const v=this.D.legend.indication&&this.D.legend.indication.values[r.indication]; return v?(v.tier||9):9;};\n    return recs.slice().sort((a,b)=>tier(a)-tier(b))[0];\n  }\n  dotsFor(recs){ const seen=[]; recs.forEach(r=>{ if(!seen.includes(r.tip)) seen.push(r.tip); }); return seen.slice(0,4).map(t=>({style:this.dot(t)})); }\n  sitCard(sit, onOpen, withCrumb){\n    const recs=this.recsBySit.get(sit.id)||[]; const best=this.bestRec(recs);\n    const bestInd=best?best.indication:'';\n    const ch=this.chById.get(sit.chapterId), sub=this.subById.get(sit.subchapterId);\n    return {\n      name:sit.name, onOpen,\n      crumb: withCrumb?`${ch?ch.name:''} › ${sub?sub.name:''}`:'',\n      bestExam: best?best.exam:'—', bestIcon:this.indIcon(bestInd),\n      bestStyle: this.badgeStyle(bestInd,'sm'),\n      recMeta: recs.length+(recs.length===1?' recomandare':' recomandări'),\n      dots: this.dotsFor(recs)\n    };\n  }\n\n  // ---------- navigation ----------\n  scrollTop(){ requestAnimationFrame(()=>{ try{window.scrollTo(0,0);}catch(e){} }); }\n  SNAP=['view','chapterId','subId','sitId','query','legendOpen','aboutOpen'];\n  snapshot(patch){ const s={}; this.SNAP.forEach(k=>{ s[k]=(patch&&k in patch)?patch[k]:this.state[k]; }); return s; }\n  navTo(patch,opts){ try{ history.pushState(this.snapshot(patch),''); }catch(e){} this.setState(patch); if(!(opts&&opts.noScroll)) this.scrollTop(); }\n  initHistory(){\n    this._pop=(e)=>{ const s=e.state; if(!s){ this.setState({view:'home',legendOpen:false,aboutOpen:false}); this.scrollTop(); return; }\n      const patch={}; this.SNAP.forEach(k=>{ if(k in s) patch[k]=s[k]; });\n      this.setState(patch);\n      if(patch.view==='search' && patch.query) this.runSearch(patch.query);\n      this.scrollTop();\n    };\n    window.addEventListener('popstate', this._pop);\n    try{ history.replaceState(this.snapshot(),''); }catch(e){}\n  }\n  goHome=()=>{ this.navTo({view:'home',legendOpen:false,aboutOpen:false}); };\n  goSearch=()=>{ this.navTo({view:'search',legendOpen:false,aboutOpen:false}); setTimeout(()=>{ if(this.input) this.input.focus(); },60); };\n  goFavs=()=>{ this.navTo({view:'favs',legendOpen:false,aboutOpen:false}); };\n  openChapter=(id)=>{ this.navTo({view:'chapter',chapterId:id,legendOpen:false}); };\n  openSub=(id)=>{ const s=this.subById.get(id); this.navTo({view:'sub',subId:id,chapterId:s?s.chapterId:this.state.chapterId,legendOpen:false}); };\n  openSit=(id)=>{ const s=this.sitById.get(id); const recent=[id,...(this.state.recent||[]).filter(x=>x!==id)].slice(0,10); const access={...(this.state.access||{})}; if(s) access[s.chapterId]=(access[s.chapterId]||0)+1; try{localStorage.setItem('iris.recent',JSON.stringify(recent));localStorage.setItem('iris.access',JSON.stringify(access));}catch(e){} this.navTo({view:'sit',sitId:id,subId:s?s.subchapterId:this.state.subId,chapterId:s?s.chapterId:this.state.chapterId,legendOpen:false,recent,access}); };\n  clearRecent=()=>{ try{localStorage.removeItem('iris.recent');}catch(e){} this.setState({recent:[]}); };\n  backToChapter=()=>{ this.navTo({view:'chapter'}); };\n  backToSub=()=>{ this.navTo({view:'sub'}); };\n  toggleTheme=()=>{ const t=this.light?'dark':'light'; this.setState({theme:t}); try{localStorage.setItem('iris.theme',t);}catch(e){} };\n  openLegend=()=>this.navTo({legendOpen:true},{noScroll:true});\n  closeLegend=()=>{ if(this.state.legendOpen && history.state && history.state.legendOpen){ history.back(); } else this.setState({legendOpen:false}); };\n  openAbout=()=>this.navTo({aboutOpen:true},{noScroll:true});\n  closeAbout=()=>{ if(this.state.aboutOpen && history.state && history.state.aboutOpen){ history.back(); } else this.setState({aboutOpen:false}); };\n  stop=(e)=>{ e.stopPropagation(); };\n\n  // ---------- search ----------\n  onInput=(e)=>{ const q=e.target.value; this.setState({query:q, aiNote:''}); this.runSearch(q); };\n  setQuery=(q)=>{ this.navTo({view:'search',query:q,aiNote:''}); this.runSearch(q); setTimeout(()=>{ if(this.input) this.input.focus(); },60); };\n  clearQuery=()=>{ this.setState({query:'',results:[],aiNote:''}); if(this.input) this.input.focus(); };\n  lev(a,b){ const m=a.length,n=b.length; if(Math.abs(m-n)>1) return 2; const d=[]; for(let i=0;i<=m;i++)d[i]=[i]; for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); return d[m][n]; }\n  expand(raw, tokens){\n    const set=new Set(tokens);\n    (this.D.synonyms||[]).forEach(g=>{\n      const hit=g.terms.some(t=>{ const nt=this.norm(t); return raw.includes(nt)||nt.includes(raw)||nt.split(/\\s+/).some(w=>tokens.includes(w)); });\n      if(hit) g.expand.forEach(e=>this.norm(e).split(/\\s+/).forEach(w=>{ if(w.length>1) set.add(w); }));\n    });\n    return [...set];\n  }\n  runSearch(q){\n    const raw=this.norm(q); if(raw.length<2){ this.setState({results:[]}); return; }\n    const tokens=raw.split(/\\s+/).filter(t=>t.length>1);\n    const terms=this.expand(raw,tokens);\n    const orig=new Set(tokens);\n    const out=[];\n    for(const it of this.index){\n      let sc=0;\n      for(const t of terms){\n        const w=orig.has(t)?1:0.6;\n        if(it.name.includes(t)) sc+=4*w;\n        else if(it.body.includes(t)) sc+=1.4*w;\n        else if(t.length>=4 && it.nameWords.some(x=>Math.abs(x.length-t.length)<=1 && this.lev(x,t)<=1)) sc+=2.4*w;\n      }\n      if(sc>0) out.push({it,sc});\n    }\n    out.sort((a,b)=>b.sc-a.sc);\n    this.setState({results: out.slice(0,60).map(o=>o.it.sit)});\n  }\n  onAI=async ()=>{\n    if(this.state.aiBusy) return;\n    const q=this.state.query.trim(); if(!q){ if(this.input)this.input.focus(); return; }\n    this.setState({aiBusy:true, aiNote:''});\n    try{\n      const prompt=`Ești asistent pentru un ghid de indicații radioimagistice în limba română. Utilizatorul caută liber: \"${q}\". Returnează STRICT un array JSON de 3-7 termeni clinici în limba română (situații clinice, simptome, regiuni anatomice sau denumiri de examinări) care ar apărea într-un astfel de ghid și corespund intenției. Doar JSON, fără explicații. Exemplu format: [\"perimetru cranian\",\"macrocranie\",\"hidrocefalie\"]`;\n      const resp=await window.claude.complete(prompt);\n      let terms=[]; const m=resp&&resp.match(/\\[[\\s\\S]*\\]/); if(m){ try{ terms=JSON.parse(m[0]); }catch(e){} }\n      terms=(terms||[]).filter(t=>typeof t==='string').slice(0,7);\n      if(terms.length){\n        const norm=terms.map(t=>this.norm(t)).filter(Boolean);\n        const words=new Set(); norm.forEach(t=>t.split(/\\s+/).forEach(w=>{if(w.length>1)words.add(w);}));\n        const arr=[...words]; const out=[];\n        for(const it of this.index){ let sc=0; for(const t of arr){ if(it.name.includes(t))sc+=4; else if(it.body.includes(t))sc+=1.4; } if(sc>0)out.push({it,sc}); }\n        out.sort((a,b)=>b.sc-a.sc);\n        this.setState({results:out.slice(0,60).map(o=>o.it.sit), aiNote:`Interpretat ca: ${terms.join(', ')}`, aiBusy:false});\n      } else { this.setState({aiBusy:false, aiNote:'Nu am putut interpreta. Încearcă alți termeni.'}); }\n    }catch(e){ this.setState({aiBusy:false, aiNote:'Interpretarea AI nu este disponibilă acum (offline?). Se folosește căutarea locală.'}); }\n  }\n\n  // ---------- favorites / share / print ----------\n  togglePregnancy=()=>{ this.setState(s=>({pregnancy:!s.pregnancy})); };\n  toggleFav=()=>{ const id=this.state.sitId; const favs=this.state.favs.includes(id)?this.state.favs.filter(x=>x!==id):[...this.state.favs,id]; this.setState({favs, toast: this.state.favs.includes(id)?'Eliminat din salvate':'Salvat ★'}); try{localStorage.setItem('iris.favs',JSON.stringify(favs));}catch(e){} clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:''}),1800); };\n  doPrint=()=>{ const prev=this.state.theme; const run=()=>{ try{window.print();}catch(e){} if(this.state.theme!==prev) this.setState({theme:prev}); }; if(prev!=='light'){ this.setState({theme:'light'}); setTimeout(run,140); } else { run(); } };\n  doShare=async ()=>{\n    const s=this.sitById.get(this.state.sitId); if(!s) return;\n    const recs=this.recsBySit.get(s.id)||[];\n    const text=`${s.name}\\n\\n`+recs.map(r=>`• ${r.exam} — ${r.indication}${r.grade?` (grad ${r.grade})`:''}`).join('\\n')+`\\n\\n— IRIS · Indicații radioimagistice structurate`;\n    try{ if(navigator.share){ await navigator.share({title:'Iris — '+s.name, text}); return; } }catch(e){ if(e&&e.name==='AbortError') return; }\n    try{ await navigator.clipboard.writeText(text); this.setState({toast:'Copiat în clipboard'}); }catch(e){ this.setState({toast:'Nu s-a putut copia'}); }\n    clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:''}),1800);\n  }\n\n  // ---------- render ----------\n  renderVals(){\n    const D=this.D||{chapters:[],legend:{}}; const v=this.state.view;\n    const navStyle=(active)=>`flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;border:0;background:transparent;cursor:pointer;color:${active?'var(--accent)':'var(--faint)'}`;\n    const chipS=`font:500 11.5px 'IBM Plex Mono',monospace;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap`;\n    const chipAccent=`font:500 11.5px 'IBM Plex Mono',monospace;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap`;\n    const examples=[\n      {label:'dispnee →', q:'dispnee', accent:true},\n      {label:'AVC', q:'accident vascular cerebral'},\n      {label:'lombalgie', q:'durere lombara'},\n      {label:'apendicită', q:'apendicita'},\n      {label:'colică renală', q:'colica renala'},\n      {label:'nodul tiroidian', q:'tiroida nodul'}\n    ].map(c=>({label:c.label, style:c.accent?chipAccent:chipS, onClick:()=>this.setQuery(c.q)}));\n\n    const vals={\n      rootRef:(el)=>{ this.root=el; if(el){ el.setAttribute('data-theme',this.state.theme); if(this.props.accent) el.style.setProperty('--accent',this.props.accent);} },\n      themeIcon:this.light?'☀':'☾',\n      isHome:v==='home', isSearch:v==='search', isChapter:v==='chapter', isSub:v==='sub', isSit:v==='sit', isFavs:v==='favs',\n      goHome:this.goHome, goSearch:this.goSearch, goFavs:this.goFavs, toggleTheme:this.toggleTheme,\n      openLegend:this.openLegend, closeLegend:this.closeLegend, stop:this.stop, legendOpen:this.state.legendOpen,\n      aboutOpen:this.state.aboutOpen, openAbout:this.openAbout, closeAbout:this.closeAbout,\n      sourceUrl:'https://ms.ro/media/documents/Ghid-de-utilizare-a-investiga%C8%9Biilor-radiologice-%C5%9Fi-imagistice-medicale.pdf',\n      repoUrl:'https://github.com/cstroie/iris',\n      toast:this.state.toast,\n      installReady:this.state.installReady, iosInstall:this.state.iosInstall, doInstall:this.doInstall, dismissInstall:this.dismissInstall,\n      updateReady:this.state.updateReady, applyUpdate:this.applyUpdate,\n      navHomeStyle:navStyle(v==='home'), navSearchStyle:navStyle(v==='search'), navFavStyle:navStyle(v==='favs'),\n      favBadge: this.state.favs.length?` ·${this.state.favs.length}`:'',\n      countSituations:(D.meta&&D.meta.counts.situations)||this.index?this.index.length:0,\n      countRecs:(D.meta&&D.meta.counts.recommendations)||0,\n      countChapters:D.chapters.length,\n      exampleChips:examples\n    };\n\n    // HOME chapters\n    if(v==='home'){\n      if(!this._heroTitle){ const H=this.HERO; this._heroTitle=H[Math.floor(Math.random()*H.length)]; }\n      vals.heroTitle=this._heroTitle;\n      const recent=(this.state.recent||[]).map(id=>this.sitById.get(id)).filter(Boolean);\n      vals.hasRecent=recent.length>0; vals.clearRecent=this.clearRecent;\n      const acc=this.state.access||{}; const featuredSet=new Set(Object.keys(acc).filter(k=>acc[k]>0).sort((a,b)=>acc[b]-acc[a]).slice(0,3));\n      vals.recentVM=recent.slice(0,8).map(q=>{ const card=this.sitCard(q, ()=>this.openSit(q.id), true); card.crumb=card.crumb.toUpperCase(); return card; });\n      vals.chaptersVM=D.chapters.map((c,i)=>{\n        const recs=(this.sitsBySub.get?0:0);\n        const subs=this.subsByChap.get(c.id)||[];\n        const featured=featuredSet.has(c.id);\n        const dots=[]; const tipset=[];\n        subs.forEach(s=>{ (this.sitsBySub.get(s.id)||[]).forEach(q=>{ (this.recsBySit.get(q.id)||[]).forEach(r=>{ if(!tipset.includes(r.tip))tipset.push(r.tip); }); }); });\n        return {\n          name:c.name, onOpen:()=>this.openChapter(c.id),\n          cardBg: 'var(--surface)',\n          cardBorder: featured?'var(--accent-border)':'var(--border)',\n          nameColor: 'var(--text)',\n          metaColor: 'var(--faint)',\n          meta:`${subs.length} ${subs.length===1?'subcapitol':'subcapitole'} · ${c.count} situații`,\n          dots: tipset.slice(0,3).map(t=>({style:this.dot(t)}))\n        };\n      });\n    }\n\n    // SEARCH\n    if(v==='search'){\n      const hasQ=this.state.query.trim().length>0;\n      const res=this.state.results||[];\n      vals.query=this.state.query; vals.hasQuery=hasQ;\n      vals.inputRef=(el)=>{ this.input=el; };\n      vals.onInput=this.onInput; vals.clearQuery=this.clearQuery;\n      vals.aiAvailable = typeof window!=='undefined' && window.claude && typeof window.claude.complete==='function';\n      vals.aiBusy=this.state.aiBusy; vals.aiNote=this.state.aiNote;\n      vals.aiHint = this.state.aiBusy?'Se interpretează…':'căutare non-specifică';\n      vals.aiBtnStyle=`display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);border-radius:11px;padding:9px 14px;font:600 12.5px 'Space Grotesk',sans-serif;cursor:${this.state.aiBusy?'default':'pointer'};opacity:${this.state.aiBusy?.6:1}`;\n      vals.aiSpinStyle = this.state.aiBusy?`width:12px;height:12px;border:2px solid var(--accent);border-right-color:transparent;border-radius:50%;display:inline-block;animation:irisspin .7s linear infinite`:'display:none';\n      vals.aiSpin=this.state.aiBusy; vals.onAI=this.onAI;\n      vals.showSearchIntro = !hasQ;\n      vals.hasResults = hasQ && res.length>0;\n      vals.noResults = hasQ && this.norm(this.state.query).length>=2 && res.length===0;\n      vals.resultLabel = `${res.length} ${res.length===1?'REZULTAT':'REZULTATE'}`;\n      vals.resultsVM = res.map(sit=>this.sitCard(sit, ()=>this.openSit(sit.id), true)).map((c,i)=>({...c,\n        crumb:c.crumb.toUpperCase()\n      }));\n    }\n\n    // CHAPTER\n    if(v==='chapter'){\n      const c=this.chById.get(this.state.chapterId);\n      vals.curChapterName=c?c.name:''; vals.curChapterMeta=c?`${(this.subsByChap.get(c.id)||[]).length} subcapitole · ${c.count} situații`:'';\n      vals.subsVM=(this.subsByChap.get(this.state.chapterId)||[]).map((s,i)=>({\n        name:s.name, count:s.count+'', num:String(i+1).padStart(2,'0'), onOpen:()=>this.openSub(s.id)\n      }));\n    }\n\n    // SUB\n    if(v==='sub'){\n      const s=this.subById.get(this.state.subId), c=this.chById.get(this.state.chapterId);\n      vals.curSubName=s?s.name:'';\n      vals.subCrumbs=[{label:(c?c.name:'').toUpperCase(), onClick:()=>this.openChapter(this.state.chapterId), sep:false}];\n      vals.curSubMeta=s?`${(this.sitsBySub.get(s.id)||[]).length} situații clinice`:'';\n      vals.backToChapter=this.backToChapter;\n      vals.sitsVM=(this.sitsBySub.get(this.state.subId)||[]).map(q=>this.sitCard(q, ()=>this.openSit(q.id), false));\n    }\n\n    // SIT\n    if(v==='sit'){\n      const s=this.sitById.get(this.state.sitId), c=this.chById.get(this.state.chapterId), sub=this.subById.get(this.state.subId);\n      vals.curSitName=s?s.name:'';\n      vals.sitPrintCrumb=[(c?c.name:''),(sub?sub.name:'')].filter(Boolean).join('  /  ');\n      vals.sitCrumbs=[{label:(c?c.name:'').toUpperCase(), onClick:()=>this.openChapter(this.state.chapterId), sep:false},{label:(sub?sub.name:'').toUpperCase(), onClick:()=>this.openSub(this.state.subId), sep:true}];\n      vals.backToSub=this.backToSub;\n      const fav=this.state.favs.includes(this.state.sitId);\n      vals.favActive=fav; vals.favIcon=fav?'★':'☆'; vals.favLabel=fav?'Salvat':'Salvează';\n      vals.favBtnStyle=`display:inline-flex;align-items:center;gap:7px;border:1px solid ${fav?'var(--accent-border)':'var(--border)'};background:${fav?'var(--accent-dim)':'var(--surface)'};color:${fav?'var(--accent)':'var(--muted)'};border-radius:11px;padding:9px 14px;font:600 13px 'Space Grotesk',sans-serif;cursor:pointer`;\n      vals.toggleFav=this.toggleFav; vals.doShare=this.doShare; vals.doPrint=this.doPrint;\n      const recs=this.recsBySit.get(this.state.sitId)||[];\n      const preg=this.state.pregnancy;\n      vals.pregnancy=preg; vals.togglePregnancy=this.togglePregnancy;\n      vals.pregBtnStyle=`display:inline-flex;align-items:center;gap:7px;border:1px solid ${preg?'oklch(0.7 0.12 20 / .5)':'var(--border)'};background:${preg?'oklch(0.5 0.12 20 / .16)':'var(--surface)'};color:${preg?'oklch(0.72 0.15 20)':'var(--muted)'};border-radius:11px;padding:9px 14px;font:600 13px 'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap`;\n      // radiation-free nudge: best is irradiating, but a well-indicated non-irradiating option exists\n      const tierOf=r=>{const v=this.D.legend.indication&&this.D.legend.indication.values[r.indication]; return v?(v.tier||9):9;};\n      const best=this.bestRec(recs);\n      const bestDose=best?this.doseInfo(best):{hasDose:false};\n      const altFree=recs.find(r=>r!==best && tierOf(r)<=2 && this.doseInfo(r).level===0);\n      vals.showFreeNudge = !!(best && bestDose.hasDose && bestDose.level>0 && altFree);\n      vals.freeNudgeExam = altFree?altFree.exam:'';\n      vals.recsVM=recs.map(r=>{\n        const dose=this.doseInfo(r);\n        const irradiating = dose.hasDose && dose.level>0;\n        return {\n          pregWarn: preg && irradiating,\n          pregSafe: preg && dose.hasDose && dose.level===0,\n          tipShort:this.tipShort(r.tip), chipStyle:this.chipStyle(r.tip),\n          exam:r.exam, indication:r.indication||'—', indIcon:this.indIcon(r.indication),\n          badgeStyle:this.badgeStyle(r.indication), barColor:this.badgeBar(r.indication),\n          hasGrade:!!r.grade, grade:r.grade, gradeTitle: r.grade?`Grad ${r.grade} — ${this.GRADE[r.grade]||''}`:'',\n          hasComments:!!r.comments, comments:r.comments,\n          hasOther:!!r.otherInfo, otherInfo:r.otherInfo,\n          hasDose:dose.hasDose, doseSegs:dose.segs||[], doseColor:dose.color||'var(--muted)', doseLabel:dose.label||''\n        };\n      });\n    }\n\n    // FAVS\n    if(v==='favs'){\n      const favSits=this.state.favs.map(id=>this.sitById.get(id)).filter(Boolean);\n      vals.hasFavs=favSits.length>0; vals.noFavs=favSits.length===0;\n      vals.favsVM=favSits.map(q=>{ const card=this.sitCard(q, ()=>this.openSit(q.id), true); card.crumb=card.crumb.toUpperCase(); return card; });\n    }\n\n    // LEGEND\n    if(this.state.legendOpen){\n      const ind=D.legend.indication?D.legend.indication.values:{};\n      vals.legendInd=Object.keys(ind).map(k=>({name:k, desc:ind[k].desc, icon:this.indIcon(k), badgeStyle:this.badgeStyle(k,'sm')}));\n      const scale=(D.legend.dose&&D.legend.dose.scale)||[];\n      vals.legendDose=scale.map(d=>({ band:d.band, est:d.est, color:this.doseTextColor(d.level),\n        segsEl: React.createElement('span',{style:{display:'flex',gap:'3px'}}, this.doseSegs(d.level).map((s,i)=>React.createElement('span',{key:i,style:this.parseStyle(s.style)}))) }));\n      const mod=D.legend.modality?D.legend.modality.values:{};\n      vals.legendMod=Object.keys(mod).map(k=>({short:mod[k].short, name:mod[k].name, chipStyle:this.chipStyle(k)}));\n    }\n\n    return vals;\n  }\n  badgeBar2_removed(){}\n  parseStyle(str){ const o={}; str.split(';').forEach(p=>{ const i=p.indexOf(':'); if(i>0){ const k=p.slice(0,i).trim().replace(/-([a-z])/g,(m,c)=>c.toUpperCase()); o[k]=p.slice(i+1).trim(); } }); return o; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
